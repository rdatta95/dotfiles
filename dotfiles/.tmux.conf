# ========================================================= #
# INSTRUCTIONS
# ----------------------------
# - Use the following for better readability:
#   - bind-key, instead of bind
#   - unbind-key, instead of unbind 
#   - set-option, instead of set
# ========================================================= #

# -------------------------------------------------------- #
# CONSTANTS
# -------------------------------------------------------- #
HISTCOUNT=500000
MSG_DISPLAY_TIME_MS=3000


# -------------------------------------------------------- #
# Main configurations
# -------------------------------------------------------- #
unbind-key C-b              # disable default prefix
set-option -s -g prefix `   # set prefix to backtick `
bind-key '`' send-prefix    # allow typing backtick by pressing it twice


# -------------------------------------------------------- #
# Print help (accessible with "prefix + h")
# -------------------------------------------------------- #
bind-key h display-popup '
cat <<EOF
Custom tmux bindings
────────────────────
prefix + ?      show default key bindings
prefix + -      split pane vertically
prefix + |      split pane horizontally
prefix + C      capture pane to file
prefix + H      toggle continuous pane logging
prefix + P      save pane history to file
prefix + h      show this help message
prefix + m      toggle mouse on/off
prefix + r      reload tmux config
Alt + ←/→/↑/↓   switch panes
Esc + ←/→/↑/↓   switch panes
Mouse Wheel     scroll up/down in copy mode
EOF
'


# -------------------------------------------------------- #
# Bind / Unbind keys
# -------------------------------------------------------- #
# -------------------
# Unbind default keys
# -------------------
unbind-key %                # unbind default horizontal split
unbind-key '"'              # unbind default vertical split
# -------------------
# split panes
# -------------------
bind-key | split-window -h -c "#{pane_current_path}"    # horizontal split
bind-key - split-window -v -c "#{pane_current_path}"    # vertical split
# -------------------
# reload tmux config
# -------------------
bind-key r source-file ~/.tmux.conf \; \
    display-message -d ${MSG_DISPLAY_TIME_MS} "Config Reloaded!"  
# -------------------
# save pane output/history
# -------------------
bind-key H pipe-pane -o "exec cat >>$HOME/'tmux-log-s-#S-w-#I-#W-p-#P.log'" \; \
    display-message -d ${MSG_DISPLAY_TIME_MS} "Toggled logging to $HOME/'tmux-log-s-#S-w-#I-#W-p-#P.log'"
# -------------------
# toggle logging of pane output/history
# -------------------
bind-key P command-prompt -p 'Saving pane history. Enter filename:' -I '~/tmux.history' \
    "capture-pane -S -${HISTCOUNT} ; save-buffer %1 ; delete-buffer"
# -------------------
# toggle mouse mode
# -------------------
bind-key m if -F '#{mouse}' \
  'set -g mouse off \; display-message -d ${MSG_DISPLAY_TIME_MS} "mouse tmux: off"' \
  'set -g mouse on  \; display-message -d ${MSG_DISPLAY_TIME_MS} "mouse tmux: on"'
# -------------------
# pane switching
# -------------------
bind-key -n M-Left  select-pane -L      # switch to left pane
bind-key -n M-Right select-pane -R      # switch to right pane
bind-key -n M-Up    select-pane -U      # switch to upper pane
bind-key -n M-Down  select-pane -D      # switch to lower pane
# -------------------
# Copy mode when scrolling up/down
# -------------------
bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind-key -n WheelDownPane select-pane -t= \; send-keys -M
# -------------------
# Visual mode select/copy
# -------------------
bind-key -T copy-mode-vi v send-keys -X begin-selection             # start selection with 'v'
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel   # copy selection and exit copy mode with 'y'


# -------------------------------------------------------- #
# Set options
# -------------------------------------------------------- #
# -------------------
# Server options
# -------------------
set-option set-clipboard external                       # enable clipboard integration
set-option -a terminal-features   ",xterm*:clipboard"   #
set-option -a terminal-overrides  ",xterm-256color:RGB" #
# -------------------
# Session options
# -------------------
set-option -s -g bell-action none
set-option -s -g default-command /usr/bin/bash      # set default command
set-option -s -g default-shell /bin/bash            # set default shell
set-option -s -g default-terminal "tmux-256color"   # 
set-option -s -g history-limit ${HISTCOUNT}         # increase scrollback buffer (default=2000)
set-option -s -g mouse on                           # enable mouse support
set-option -s -g visual-activity on                 #
set-option -s -g visual-bell off                    #
set-option -s -g visual-silence off                 #
# -------------------
# Window options
# -------------------
set-option -w -g mode-keys vi           # set copy mode to vi
set-option -w -g monitor-activity off   #
set-option -w -g monitor-silence 0      #
set-option -w -g wrap-search off        # wrap search around the pane
# -------------------
# Pane options
# -------------------
set-option -g allow-rename off          # disable automatic window renaming by some program
set-option -g default-command "bash -l" # set default command


source ~/.tmux.conf.style
